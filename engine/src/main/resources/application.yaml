server:
  port: 10020

spring:
  application:
    name: mall-cqupt-lqy-engine
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
  cloud:
    nacos:
      discovery:
        server-addr: common-nacos-dev.magestack.cn:8848
        enabled: false
      password: nacos
      username: nacos
  data:
    redis:
      host: 43.139.79.212
      port: 6379
      password: Lqy259931
  mybatis-plus:
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  springdoc:
    default-flat-param-object: true
    swagger-ui:
      path: /swagger-ui.html
      tags-sorter: alpha
      operations-sorter: alpha
    api-docs:
      path: /v3/api-docs
    group-configs:
      - group: 'default'
        paths-to-match: '/**'
        packages-to-scan: com.mall.cqupt
  knife4j:
    enable: true
    setting:
      language: zh_cn

rocketmq:
  name-server: common-rocketmq-dev.magestack.cn:9876
  producer:
    group: oneCoupon_engine${unique-name:}-service_common-message-execute_pg
    send-message-timeout: 2000
    retry-times-when-send-failed: 1
    retry-times-when-send-async-failed: 1

one-coupon:
  user-coupon-list:
    save-cache:
      type: direct

engine:
  cache:
    redis:
      bloom-filter:
        cancel-remind:
          name: cancel_remind_cache_penetration_bloom_filter${unique-name:}
