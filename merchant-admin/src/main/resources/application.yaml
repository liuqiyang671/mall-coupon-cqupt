server:
  port:  10010

spring:
  application:
    name: mall-cqupt-lqy-merchant-admin
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
  data:
    redis:
      host: 127.0.0.1
      port: 6379

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  default-flat-param-object: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.mall.cqupt

knife4j:
  enable: true
  setting:
    language: zh_cn

xxl-job:
  enable: false
  access-token:
  admin:
    addresses: http://localhost:8088/xxl-job-admin
  executor:
    application-name: coupon-merchant-admin
    ip: 127.0.0.1
    log-retention-days: 30
    port: 19999

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: oneCoupon_merchant-admin${unique-name:}-service_common-message-execute_pg
    send-message-timeout: 2000
    retry-times-when-send-failed: 1
    retry-times-when-send-async-failed: 1

jwt:
  secret: one-coupon-merchant-admin-jwt-secret-key-2026
  expiration: 86400000
